name: Build and Push SeaTunnel Web to ACR

on:
  workflow_dispatch:

jobs:
  build-seatunnel-web:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Node.js 16
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Clone seatunnel source
        run: |
          git clone --depth=1 --branch 2.3.11 \
            https://github.com/apache/seatunnel.git

      - name: Clone seatunnel-web source
        run: |
          git clone --depth=1 --branch 1.0.2 \
            https://github.com/apache/seatunnel-web.git

      - name: Build seatunnel engine (获取 plugin-mapping)
        working-directory: seatunnel
        run: |
          ./mvnw -B clean install \
            -DskipTests \
            -Dmaven.javadoc.skip=true \
            -Dcheckstyle.skip=true \
            -Dlicense.skipAddThirdParty=true \
            -Dskip.spotless=true

      - name: Copy plugin-mapping to seatunnel-web
        run: |
          cd seatunnel-web
          tar -zxvf ../seatunnel/seatunnel-dist/target/apache-seatunnel-2.3.11-bin.tar.gz
          cp apache-seatunnel-2.3.11/connectors/plugin-mapping.properties \
            seatunnel-server/seatunnel-app/src/main/resources/

      - name: Build seatunnel-web
        working-directory: seatunnel-web
        run: |
          ./mvnw -B clean install \
            -DskipTests \
            -Dmaven.javadoc.skip=true \
            -Dcheckstyle.skip=true \
            -Dskip.spotless=true

      - name: Build Docker image
        run: |
          WEB_PKG=$(find seatunnel-web/seatunnel-web-dist/target -name "*.tar.gz" | head -1)
          mkdir -p docker-build
          cp $WEB_PKG docker-build/

          cat > docker-build/Dockerfile << 'EOF'
          FROM eclipse-temurin:11-jre-jammy
          WORKDIR /opt
          COPY *.tar.gz /opt/
          RUN tar -zxvf *.tar.gz && \
              mv apache-seatunnel-web-* seatunnel-web && \
              rm -f *.tar.gz
          WORKDIR /opt/seatunnel-web
          EXPOSE 8849
          CMD ["sh", "bin/seatunnel-backend-daemon.sh", "start"]
          EOF

          cd docker-build
          docker build -t seatunnel-web:1.0.2 .

      - name: Login to Aliyun ACR
        run: |
          docker login \
            -u ${{ secrets.ALI_REGISTRY_USER }} \
            -p ${{ secrets.ALI_REGISTRY_PWD }} \
            ${{ secrets.ALI_REGISTRY }}

      - name: Push to ACR
        run: |
          docker tag seatunnel-web:1.0.2 \
            ${{ secrets.ALI_REGISTRY }}/yusp-mirrors/seatunnel-web:1.0.2
          docker push \
            ${{ secrets.ALI_REGISTRY }}/yusp-mirrors/seatunnel-web:1.0.2
          echo "✅ 推送完成！"
          echo "拉取命令: docker pull ${{ secrets.ALI_REGISTRY }}/yusp-mirrors/seatunnel-web:1.0.2"
