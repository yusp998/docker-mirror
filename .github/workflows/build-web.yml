name: Build and Push SeaTunnel Web to ACR

on:
  workflow_dispatch:

jobs:
  build-seatunnel-web:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Node.js 16
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Clone seatunnel source
        run: git clone --depth=1 --branch 2.3.11 https://github.com/apache/seatunnel.git

      - name: Clone seatunnel-web source
        run: git clone --depth=1 --branch 1.0.2 https://github.com/apache/seatunnel-web.git

      - name: Build seatunnel engine
        working-directory: seatunnel
        run: ./mvnw -B clean install -DskipTests -Dmaven.javadoc.skip=true -Dcheckstyle.skip=true -Dlicense.skipAddThirdParty=true -Dskip.spotless=true

      - name: Copy plugin-mapping to seatunnel-web
        run: |
          cd seatunnel-web
          tar -zxvf ../seatunnel/seatunnel-dist/target/apache-seatunnel-2.3.11-bin.tar.gz
          cp apache-seatunnel-2.3.11/connectors/plugin-mapping.properties seatunnel-server/seatunnel-app/src/main/resources/

      - name: Build seatunnel-web
        working-directory: seatunnel-web
        run: ./mvnw -B clean install -DskipTests -Dmaven.javadoc.skip=true -Dcheckstyle.skip=true -Dskip.spotless=true

      - name: Build Docker image
        run: |
          WEB_PKG=$(find seatunnel-web/seatunnel-web-dist/target -name "*.tar.gz" | head -1)
          echo "找到的web包: $WEB_PKG"

          mkdir -p docker-build
          cp $WEB_PKG docker-build/
          cp seatunnel/seatunnel-dist/target/apache-seatunnel-2.3.11-bin.tar.gz docker-build/

          WEB_PKG_NAME=$(basename $WEB_PKG)

          # 提取web目录名
          cd docker-build
          tar -zxvf $WEB_PKG_NAME
          WEB_DIR=$(ls -d */ | head -1 | tr -d '/')
          echo "web目录名: $WEB_DIR"
          rm -rf $WEB_DIR
          cd ..

          cat > docker-build/Dockerfile << DOCKERFILE
          FROM eclipse-temurin:11-jre-jammy
          WORKDIR /opt

          # 安装引擎
          COPY apache-seatunnel-2.3.11-bin.tar.gz /opt/
          RUN tar -zxvf apache-seatunnel-2.3.11-bin.tar.gz \\
              && mv apache-seatunnel-2.3.11 seatunnel \\
              && rm -f apache-seatunnel-2.3.11-bin.tar.gz

          # 安装 web
          COPY ${WEB_PKG_NAME} /opt/
          RUN tar -zxvf ${WEB_PKG_NAME} \\
              && mv ${WEB_DIR} seatunnel-web \\
              && rm -f ${WEB_PKG_NAME}

          # 复制必要配置文件
          RUN cp /opt/seatunnel/connectors/plugin-mapping.properties /opt/seatunnel-web/conf/ \\
              && cp /opt/seatunnel/config/hazelcast-client.yaml /opt/seatunnel-web/conf/

          # 关键：把引擎的 lib jar 复制到 web 的 libs 目录，解决 NoClassDefFoundError
          RUN cp /opt/seatunnel/lib/*.jar /opt/seatunnel-web/libs/ 2>/dev/null || true \\
              && cp /opt/seatunnel/connectors/*.jar /opt/seatunnel-web/libs/ 2>/dev/null || true

          # 环境变量
          ENV SEATUNNEL_HOME=/opt/seatunnel
          ENV ST_WEB_BASEDIR_PATH=/opt/seatunnel-web

          WORKDIR /opt/seatunnel-web
          EXPOSE 8849
          CMD ["sh", "-c", "mkdir -p logs && touch logs/seatunnel-web.log && sh bin/seatunnel-backend-daemon.sh start && tail -f logs/seatunnel-web.log"]
          DOCKERFILE

          cd docker-build
          docker build -t seatunnel-web:1.0.2 .

      - name: Login to Aliyun ACR
        run: docker login -u ${{ secrets.ALI_REGISTRY_USER }} -p ${{ secrets.ALI_REGISTRY_PWD }} ${{ secrets.ALI_REGISTRY }}

      - name: Push to ACR
        run: |
          docker tag seatunnel-web:1.0.2 crpi-w6hab0wki339s4cg.cn-hangzhou.personal.cr.aliyuncs.com/yusp-mirrors/seatunnel-web:1.0.2
          docker push crpi-w6hab0wki339s4cg.cn-hangzhou.personal.cr.aliyuncs.com/yusp-mirrors/seatunnel-web:1.0.2
          echo "✅ 推送完成！"
