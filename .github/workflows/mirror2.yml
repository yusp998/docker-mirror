name: Build and Push SeaTunnel Images

on:
  workflow_dispatch:

jobs:
  # Job1: 中转 seatunnel 引擎镜像
  mirror-seatunnel:
    runs-on: ubuntu-latest
    steps:
      - name: Pull apache/seatunnel:2.3.8
        run: docker pull apache/seatunnel:2.3.8

      - name: Login to Aliyun ACR
        run: |
          docker login \
            -u ${{ secrets.ALI_REGISTRY_USER }} \
            -p ${{ secrets.ALI_REGISTRY_PWD }} \
            ${{ secrets.ALI_REGISTRY }}

      - name: Push to ACR
        run: |
          docker tag apache/seatunnel:2.3.8 ${{ secrets.ALI_REGISTRY }}/my-mirrors/seatunnel:2.3.8
          docker push ${{ secrets.ALI_REGISTRY }}/my-mirrors/seatunnel:2.3.8

  # Job2: 编译 seatunnel-web 源码并构建镜像
  build-seatunnel-web:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Checkout seatunnel source
        run: |
          git clone --depth=1 --branch 2.3.8 https://github.com/apache/seatunnel.git
          
      - name: Checkout seatunnel-web source
        run: |
          git clone --depth=1 --branch 2.3.8 https://github.com/apache/seatunnel-web.git

      - name: Build seatunnel engine
        working-directory: seatunnel
        run: |
          ./mvnw -B clean install \
            -DskipTests \
            -Dmaven.javadoc.skip=true \
            -Dcheckstyle.skip=true \
            -Dlicense.skipAddThirdParty=true \
            -Dskip.spotless=true

      - name: Copy plugin-mapping to web
        run: |
          cp seatunnel/seatunnel-dist/target/apache-seatunnel-2.3.8-bin.tar.gz seatunnel-web/
          cd seatunnel-web
          tar -zxvf apache-seatunnel-2.3.8-bin.tar.gz
          cp apache-seatunnel-2.3.8/connectors/plugin-mapping.properties \
            seatunnel-server/seatunnel-app/src/main/resources/

      - name: Build seatunnel-web
        working-directory: seatunnel-web
        run: |
          export ST_WEB_BASEDIR_PATH=$(pwd)/seatunnel-web-dist/target/apache-seatunnel-web-2.3.8-bin/
          ./mvnw -B clean install \
            -DskipTests \
            -Dmaven.javadoc.skip=true \
            -Dcheckstyle.skip=true \
            -Dskip.spotless=true

      - name: Build Docker image for seatunnel-web
        run: |
          WEB_PKG=$(find seatunnel-web/seatunnel-web-dist/target -name "*.tar.gz" | head -1)
          mkdir -p docker-build
          cp $WEB_PKG docker-build/
          cp -r seatunnel/apache-seatunnel-2.3.8/connectors docker-build/
          
          cat > docker-build/Dockerfile << 'EOF'
          FROM openjdk:8-jre
          ENV SEATUNNEL_WEB_HOME=/opt/seatunnel-web
          COPY *.tar.gz /opt/
          RUN cd /opt && tar -zxvf *.tar.gz && \
              mv apache-seatunnel-web-* seatunnel-web && \
              rm -f *.tar.gz
          COPY connectors/ /opt/seatunnel/connectors/
          WORKDIR /opt/seatunnel-web
          EXPOSE 8849
          CMD ["sh", "bin/seatunnel-backend-daemon.sh", "start"]
          EOF
          
          cd docker-build
          docker build -t seatunnel-web:2.3.8 .

      - name: Login to Aliyun ACR
        run: |
          docker login \
            -u ${{ secrets.ALI_REGISTRY_USER }} \
            -p ${{ secrets.ALI_REGISTRY_PWD }} \
            ${{ secrets.ALI_REGISTRY }}

      - name: Push seatunnel-web to ACR
        run: |
          docker tag seatunnel-web:2.3.8 ${{ secrets.ALI_REGISTRY }}/my-mirrors/seatunnel-web:2.3.8
          docker push ${{ secrets.ALI_REGISTRY }}/my-mirrors/seatunnel-web:2.3.8
          echo "✅ 推送完成！"
